<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>독서 기록 대시보드</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/readinglog.css">
</head>
<body data-page="dashboard">
  <div class="container">
    <div class="page-header">
      <p class="eyebrow">Dashboard</p>
      <h1>독서 기록 대시보드</h1>
      <p class="description">
        나의 독서 기록과 누적 시간을 확인하세요.
      </p>
      <p class="page-header-nav">
        <a class="text-link" href="/mypage">← My Page</a>
      </p>
    </div>

    <!-- 1. 총 독서 시간 요약 패널 -->
    <div class="panel panel-stack">
      <div class="panel-header">
        <h2>전체 누적 시간</h2>
      </div>
      <div class="content-box">
        <div class="stat-card">
          <div class="stat-value" id="totalTimeDisplay">-</div>
          <div class="stat-label">총 독서 시간</div>
        </div>
      </div>
    </div>

    <!-- 2. 탭 기반 독서 기록 뷰 -->
    <div class="panel panel-stack">
      <div class="panel-header panel-header--tabs">
        <div class="tabs">
          <button class="tab-btn active" id="btn-recent">최근 독서 기록</button>
          <button class="tab-btn" id="btn-by-book">책별 누적 시간</button>
        </div>
      </div>

      <div class="content-box content-box--flush-top">
        <div id="tab-recent" class="tab-content active">
          <div id="recent-loading" class="loading">불러오는 중...</div>
          <ul class="list" id="recent-list" style="display: none;"></ul>
        </div>

        <div id="tab-by-book" class="tab-content">
          <ul class="list" id="by-book-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/readinglog.js"></script>
</body>
</html>
