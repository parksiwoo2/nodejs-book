<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="container">
      <section class="page-header">
        <p class="eyebrow">Account</p>
        <h1>로그인</h1>
        <p class="description">계정으로 로그인하거나 현재 계정에서 로그아웃할 수 있습니다.</p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2 id="loginPanelTitle">로그인</h2>
          <a class="text-link" href="/register">회원가입</a>
        </div>

        <form id="loginForm" class="form form-panel">
          <div class="field">
            <label for="username">사용자 아이디</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="사용자 아이디를 입력하세요"
              autocomplete="username"
              required
            />
          </div>

          <div class="field">
            <label for="password">비밀번호</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit">로그인</button>
          <p id="loginMessage" class="message" aria-live="polite"></p>
        </form>

        <div id="logoutPanel" class="form-panel" hidden>
          <p class="description">이미 로그인되어 있습니다.</p>
          <div class="row-actions">
            <a class="text-link" href="/">메인으로</a>
            <button type="button" id="logoutButton">로그아웃</button>
          </div>
          <p id="logoutMessage" class="message" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="/js/login.js"></script>
  </body>
</html>
