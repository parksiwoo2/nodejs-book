<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>독서 시간 타이머</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/reading.css">
</head>
<body>
  <div class="container">
    <div class="page-header">
      <p class="eyebrow">Reading Timer</p>
      <h1>독서 시간 기록</h1>
      <p class="description">오늘의 독서 시간을 측정하고 백엔드 서버에 저장합니다.</p>
    </div>

    <div class="panel" style="margin-bottom: 24px;">
      <div class="panel-header">
        <h2>테스트 데이터 설정</h2>
      </div>
      <div class="content-box">
        <div class="form">
          <div class="field">
            <input type="hidden" id="userId" value="">
          </div>
          <div class="field">
            <label>Book ID</label>
            <input type="text" id="bookId" value="60d5ecb8b392d7001f3e3a13" placeholder="책 ID 입력">
          </div>
          <div class="field">
            <label>Book Title</label>
            <input type="text" id="bookTitle" value="어린 왕자" placeholder="책 제목 입력">
          </div>
        </div>
      </div>
    </div>

    <div class="panel reading-panel">
      <div class="timer-display">
        <div class="timer-circle">
          <span id="time">00:00:00</span>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn" class="btn-start">시작</button>
        <button id="pauseBtn" class="btn-pause" disabled>일시정지</button>
        <button id="saveBtn" class="btn-save" disabled>기록 저장</button>
      </div>

      <div id="statusMessage" class="status-message"></div>
    </div>
  </div>

  <script src="/js/reading.js"></script>
</body>
</html>
