<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>독서 모임 방 목록</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/room.css">
</head>
<body>
  <div class="container">
    <nav class="room-nav" aria-label="주요 메뉴">
      <div class="room-nav-links">
        <a class="text-link" href="/room">홈</a>
        <a class="text-link" href="/mypage">마이페이지</a>
        <a class="text-link" href="/book-ranking">랭킹</a>
        <a class="text-link" href="/book-report">독후감 작성</a>
        <a class="text-link" href="/reading">독서 시간 측정</a>
      </div>
      <button type="button" id="roomLogoutBtn" class="room-logout-btn">로그아웃</button>
    </nav>

    <header class="page-header">
      <p class="eyebrow">Room</p>
      <h1>독서 모임 방 목록</h1>
      <p class="description">개설된 방에 참여하거나 새 방을 만듭니다.</p>
    </header>

    <section class="panel room-create-panel">
      <div class="panel-header">
        <h2>방 만들기</h2>
      </div>
      <form id="createRoomForm" class="form form-panel">
        <div class="field">
          <label for="roomTitle">방 제목</label>
          <input
            type="text"
            id="roomTitle"
            name="title"
            placeholder="예: 주말 독서 모임"
            required
            autocomplete="off"
          />
        </div>

        <div class="field">
          <label for="roomBookSelect">선정 도서</label>
          <select id="roomBookSelect" name="bookId" required>
            <option value="">책을 불러오는 중…</option>
          </select>
          <p class="room-create-hint">
            등록된 책이 없다면
            <a class="text-link" href="/book">책 등록</a>
            에서 먼저 추가하세요.
          </p>
        </div>

        <div class="room-create-actions">
          <button type="button" id="reloadBooksBtn">책 목록 새로고침</button>
          <button type="submit" id="createRoomBtn">방 만들기</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>방 목록</h2>
        <button type="button" id="refreshRoomListBtn">새로고침</button>
      </div>

      <div class="content-box room-content">
        <div id="roomStatusMessage" class="message" aria-live="polite"></div>
        <div id="roomLoading" class="loading" hidden>불러오는 중…</div>
        <div id="roomListContainer" class="room-list"></div>
      </div>
    </section>

    <nav class="room-nav-secondary" aria-label="부가 기능">
      <span class="room-nav-secondary-label">부가 기능</span>
      <a class="text-link" href="/book">책 등록</a>
    </nav>
  </div>

  <script src="/js/room.js"></script>
</body>
</html>
