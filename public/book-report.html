<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>독후감</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* 페이지 전용 최소 스타일 */
    #writeSection, #detailSection { display: none; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .row input[type="text"] { flex: 1; min-width: 180px; }
    .book-result { cursor: pointer; }
    .book-result:hover { background: rgba(0, 0, 0, 0.04); }
    .report-item { cursor: pointer; }
    .report-contents { white-space: pre-wrap; line-height: 1.7; }
    .comment { border-top: 1px solid #e5e7eb; padding: 10px 0; font-size: 14px; }
    .comment .writer { font-weight: 700; margin-right: 6px; }
    .muted { color: #6b7280; font-size: 13px; }
    .actions button { margin-right: 6px; }
  </style>
</head>
<body data-page="book-report">
  <div class="container">
    <div class="page-header">
      <p class="eyebrow">Book Report</p>
      <h1>독후감</h1>
      <p class="description">읽은 책의 감상을 남기고 댓글로 이야기를 나눠요.</p>
      <p style="margin-top: 12px;">
        <a class="text-link" href="/room">← 방 목록</a>
      </p>
    </div>

    <div class="row" style="margin-bottom: 20px;">
      <button id="btnShowWrite">독후감 쓰기</button>
      <button id="btnRefresh">새로고침</button>
    </div>

    <!-- 작성 -->
    <div id="writeSection" class="panel" style="margin-bottom: 24px;">
      <div class="panel-header"><h2>독후감 작성</h2></div>
      <div class="content-box">
        <form id="writeForm" class="form">
          <div class="field">
            <label for="wTitle">제목</label>
            <input type="text" id="wTitle" placeholder="독후감 제목" required>
          </div>

          <div class="field">
            <label>책 선택</label>
            <div class="row">
              <input type="text" id="bookQuery" placeholder="책 제목이나 저자로 검색">
              <button type="button" id="btnBookSearch">검색</button>
            </div>
            <ul class="list" id="bookResults" style="margin-top:10px"></ul>
            <p id="bookSelected" class="muted" style="display:none"></p>
          </div>

          <div class="field">
            <label for="wContents">내용</label>
            <textarea id="wContents" rows="7" placeholder="책을 읽고 느낀 점을 자유롭게" style="width:100%"></textarea>
          </div>

          <div class="row">
            <button type="submit">등록</button>
            <button type="button" id="btnCancelWrite">취소</button>
          </div>
          <p id="writeMessage" class="message" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <!-- 목록 -->
    <div id="listSection" class="panel">
      <div class="panel-header"><h2>독후감 목록</h2></div>
      <div class="content-box">
        <ul class="list" id="reportList"></ul>
        <div class="row" style="margin-top: 14px;">
          <button id="btnPrev">이전</button>
          <span class="muted" id="pageInfo"></span>
          <button id="btnNext">다음</button>
        </div>
      </div>
    </div>

    <!-- 상세 -->
    <div id="detailSection">
      <button id="btnBack" style="margin-bottom:14px">목록으로</button>

      <div class="panel" style="margin-bottom: 20px;">
        <div class="panel-header"><h2 id="dTitle"></h2></div>
        <div class="content-box">
          <p class="muted" id="dMeta"></p>
          <p class="report-contents" id="dContents" style="margin-top:12px"></p>
          <div class="row actions" style="margin-top: 14px;">
            <button id="btnEditReport">수정</button>
            <button id="btnDeleteReport">삭제</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>댓글</h2></div>
        <div class="content-box">
          <div id="commentList"></div>
          <form id="commentForm" class="row" style="margin-top: 12px;">
            <input type="text" id="cContent" placeholder="댓글을 입력하세요" required>
            <button type="submit">등록</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/book-report.js"></script>
</body>
</html>
